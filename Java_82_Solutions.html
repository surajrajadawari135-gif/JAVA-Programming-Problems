{phase:1,title:"Roots of a Quadratic Equation",desc:"Find real roots of ax² + bx + c = 0 using the discriminant formula.",code:`
import java.util.Scanner;

public class QuadraticRoots {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter a, b, c: ");
        double a = sc.nextDouble(), b = sc.nextDouble(), c = sc.nextDouble();

        double disc = b * b - 4 * a * c;

        if (disc > 0) {
            double r1 = (-b + Math.sqrt(disc)) / (2 * a);
            double r2 = (-b - Math.sqrt(disc)) / (2 * a);
            System.out.printf("Two real roots: %.4f and %.4f%n", r1, r2);
        } else if (disc == 0) {
            double r = -b / (2 * a);
            System.out.printf("One real root: %.4f%n", r);
        } else {
            double real = -b / (2 * a);
            double imag = Math.sqrt(-disc) / (2 * a);
            System.out.printf("Complex roots: %.4f + %.4fi  and  %.4f - %.4fi%n",
                real, imag, real, imag);
        }

        sc.close();
    }
}`},

{phase:1,title:"Simple Calculator (Switch Case)",desc:"Implement a basic calculator using switch-case for +, -, *, /.",code:`
import java.util.Scanner;

public class Calculator {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter first number: ");
        double a = sc.nextDouble();
        System.out.print("Enter operator (+, -, *, /): ");
        char op = sc.next().charAt(0);
        System.out.print("Enter second number: ");
        double b = sc.nextDouble();

        double result;
        switch (op) {
            case '+': result = a + b; break;
            case '-': result = a - b; break;
            case '*': result = a * b; break;
            case '/':
                if (b == 0) { System.out.println("Error: Division by zero!"); return; }
                result = a / b; break;
            default:
                System.out.println("Invalid operator!"); return;
        }

        System.out.println(a + " " + op + " " + b + " = " + result);
        sc.close();
    }
}`},

import java.util.Scanner;

public class PrimeCheck {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter a number: ");
        int n = sc.nextInt();

        boolean isPrime = n > 1;
        for (int i = 2; i <= Math.sqrt(n); i++) {

public class StrongNumber {

    static long factorial(int x) {
        long f = 1;
        for (int i = 2; i <= x; i++) f *= i;
        return f;
    }

    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter a number: ");
        int n = sc.nextInt();

        int temp = n;
        long sum = 0;
        while (temp > 0) {
            sum += factorial(temp % 10);
            temp /= 10;
        }

        if (sum == n) System.out.println(n + " is a Strong number.");
        else          System.out.println(n + " is NOT a Strong number.");

        sc.close();
    }
}`},

{phase:1,title:"GCD and LCM of Two Numbers",desc:"Find the Greatest Common Divisor using Euclidean algorithm, then compute LCM.",code:`
import java.util.Scanner;

public class GcdLcm {
    static int gcd(int a, int b) {
        // Euclidean algorithm
        while (b != 0) {
            int t = b; b = a % b; a = t;
        }
        return a;
    }

    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter two numbers: ");
        int a = sc.nextInt(), b = sc.nextInt();

        int g = gcd(a, b);
        long l = (long) a / g * b;  // avoids overflow

        System.out.println("GCD = " + g);
        System.out.println("LCM = " + l);
        sc.close();
    }
}`},

{phase:2,title:"Rotate Array Left or Right by N Positions",desc:"Rotate an array left or right by a specified number of positions.",code:`
import java.util.Scanner;

public class RotateArray {
    // Helper: reverse a subarray from l to r
    static void reverse(int[] a, int l, int r) {
        while (l < r) { int t = a[l]; a[l] = a[r]; a[r] = t; l++; r--; }
    }

    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter number of elements: ");
        int n = sc.nextInt();
        int[] arr = new int[n];
        for (int i = 0; i < n; i++) arr[i] = sc.nextInt();

        System.out.print("Rotate L(eft) or R(ight)? ");
        char dir = sc.next().toUpperCase().charAt(0);
        System.out.print("By how many positions? ");
        int k = sc.nextInt() % n;

        if (dir == 'L') {
            // Left rotate by k: reverse(0,k-1), reverse(k,n-1), reverse(0,n-1)
            reverse(arr, 0, k - 1);
            reverse(arr, k, n - 1);
            reverse(arr, 0, n - 1);
        } else {
            // Right rotate by k: reverse whole, reverse(0,k-1), reverse(k,n-1)
            reverse(arr, 0, n - 1);
            reverse(arr, 0, k - 1);
            reverse(arr, k, n - 1);
        }

        System.out.print("Rotated: ");
        for (int x : arr) System.out.print(x + " ");
        System.out.println();
        sc.close();
    }
}`},

{phase:2,title:"Binary Search",desc:"Search a sorted array using binary search — O(log n) time complexity.",code:`
import java.util.Scanner;

public class BinarySearch {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter number of elements (sorted): ");
        int n = sc.nextInt();
        int[] arr = new int[n];
        for (int i = 0; i < n; i++) arr[i] = sc.nextInt();

        System.out.print("Enter element to search: ");
        int target = sc.nextInt();

        int lo = 0, hi = n - 1, result = -1;
        while (lo <= hi) {
            int mid = lo + (hi - lo) / 2;
            if (arr[mid] == target)      { result = mid; break; }
            else if (arr[mid] < target)    lo = mid + 1;
            else                           hi = mid - 1;
        }

        if (result != -1) System.out.println("Found at index " + result);
        else              System.out.println("Element not found.");

        sc.close();
    }
}`},

import java.util.Scanner;

public class BubbleSort {
    public static void main(String[] args) {

        System.out.print("Enter number of elements: ");
        int n = sc.nextInt();
        int[] arr = new int[n];
        for (int i = 0; i < n; i++) arr[i] = sc.nextInt();

        // Bubble sort: push the largest element to the end in each pass
        for (int i = 0; i < n - 1; i++) {
            for (int j = 0; j < n - i - 1; j++) {
                if (arr[j] > arr[j + 1]) {
                    int tmp = arr[j]; arr[j] = arr[j + 1]; arr[j + 1] = tmp;
                }
            }
        }

        System.out.print("Sorted: ");
        for (int x : arr) System.out.print(x + " ");
        System.out.println();
        sc.close();
    }
}`},

import java.util.Scanner;

public class SelectionSort {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter number of elements: ");
        int n = sc.nextInt();
        int[] arr = new int[n];
        for (int i = 0; i < n; i++) arr[i] = sc.nextInt();

        // Find minimum from unsorted part and swap with first unsorted element
        for (int i = 0; i < n - 1; i++) {
            int minIdx = i;
            for (int j = i + 1; j < n; j++) {
                if (arr[j] < arr[minIdx]) minIdx = j;
            }
            int tmp = arr[minIdx]; arr[minIdx] = arr[i]; arr[i] = tmp;
        }

        System.out.print("Sorted: ");
        for (int x : arr) System.out.print(x + " ");
        System.out.println();
        sc.close();
    }
}`},

public class MatrixMultiplication {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter rows and cols of A: ");
        int r1 = sc.nextInt(), c1 = sc.nextInt();
        System.out.print("Enter rows and cols of B: ");
        int r2 = sc.nextInt(), c2 = sc.nextInt();

        if (c1 != r2) { System.out.println("Incompatible dimensions!"); return; }

        int[][] A = new int[r1][c1], B = new int[r2][c2];
        System.out.println("Enter Matrix A:"); for(int i=0;i<r1;i++) for(int j=0;j<c1;j++) A[i][j]=sc.nextInt();
        System.out.println("Enter Matrix B:"); for(int i=0;i<r2;i++) for(int j=0;j<c2;j++) B[i][j]=sc.nextInt();

        int[][] C = new int[r1][c2];
        for (int i = 0; i < r1; i++)
            for (int j = 0; j < c2; j++)
                for (int k = 0; k < c1; k++)
                    C[i][j] += A[i][k] * B[k][j];

        System.out.println("Product:");
        for (int[] row : C) { for (int x : row) System.out.print(x + "\t"); System.out.println(); }
        sc.close();
    }

import java.util.Scanner;

public class SymmetricMatrix {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter size (square matrix): ");
        int n = sc.nextInt();
        int[][] mat = new int[n][n];
        System.out.println("Enter matrix:"); for(int i=0;i<n;i++) for(int j=0;j<n;j++) mat[i][j]=sc.nextInt();

        boolean sym = true;
        outer:
        for (int i = 0; i < n; i++)
            for (int j = 0; j < n; j++)
                if (mat[i][j] != mat[j][i]) { sym = false; break outer; }

        System.out.println(sym ? "Matrix is Symmetric." : "Matrix is NOT Symmetric.");

import java.util.Scanner;

public class NumberCheckers {
    static boolean isPrime(int n) {
        if (n < 2) return false;
        for (int i = 2; i <= Math.sqrt(n); i++) if (n % i == 0) return false;
        return true;
    }

    static boolean isArmstrong(int n) {
        int digits = String.valueOf(n).length(), tmp = n, sum = 0;
        while (tmp > 0) { sum += (int)Math.pow(tmp % 10, digits); tmp /= 10; }
        return sum == n;
    }

    static boolean isPerfect(int n) {
        int sum = 0;
        for (int i = 1; i < n; i++) if (n % i == 0) sum += i;
        return sum == n;
    }

    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);
        System.out.print("Enter a number: ");
        int n = sc.nextInt();

        System.out.println("Prime?    " + isPrime(n));
        System.out.println("Armstrong? " + isArmstrong(n));
        System.out.println("Perfect?  " + isPerfect(n));
        sc.close();
    }
}`},

public class PowerRecursive {
    static double power(double base, int exp) {
        if (exp == 0) return 1;
        if (exp < 0)  return 1.0 / power(base, -exp);
        if (exp % 2 == 0) { double half = power(base, exp / 2); return half * half; }
        return base * power(base, exp - 1);
    }

    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);
        System.out.print("Enter base and exponent: ");
        double b = sc.nextDouble();
        int e = sc.nextInt();

        sc.close();
    }
}`},

{phase:5,title:"Singly Linked List (Insert, Delete, Display)",desc:"Basic singly linked list with insert at end, delete by value, and display.",code:`
import java.util.Scanner;

public class LinkedList {
    static class Node { int data; Node next; Node(int d){data=d;} }

    static Node head = null;

    static void insert(int val) {
        Node n = new Node(val);
        if (head == null) { head = n; return; }
        Node cur = head;
        while (cur.next != null) cur = cur.next;
        cur.next = n;
    }

    static void delete(int val) {
        if (head == null) return;
        if (head.data == val) { head = head.next; return; }
        Node cur = head;
        while (cur.next != null && cur.next.data != val) cur = cur.next;
        if (cur.next != null) cur.next = cur.next.next;
    }

    static void display() {
        Node cur = head;
        while (cur != null) { System.out.print(cur.data + " -> "); cur = cur.next; }
        System.out.println("null");
    }

    public static void main(String[] args) {
        insert(10); insert(20); insert(30); insert(40);
        System.out.print("List: "); display();
        delete(20);
        System.out.print("After deleting 20: "); display();
    }
}`},

public class ReverseLinkedList {
    static class Node { int data; Node next; Node(int d){data=d;} }

    static Node reverse(Node head) {
        Node prev = null, cur = head;
        while (cur != null) {
            Node next = cur.next;
            cur.next = prev;
            prev = cur;
            cur = next;
        }
        return prev; // new head
    }

    static void print(Node h) {
        while (h != null) { System.out.print(h.data + " -> "); h = h.next; }
        System.out.println("null");
    }

    public static void main(String[] args) {
        // Build: 1 -> 2 -> 3 -> 4 -> null
        Node head = new Node(1);
        head.next = new Node(2);
        head.next.next = new Node(3);
        head.next.next.next = new Node(4);

        System.out.print("Original: "); print(head);
        head = reverse(head);
        System.out.print("Reversed: "); print(head);
    }
}`},

public class DoublyLinkedList {
    static class Node { int data; Node prev, next; Node(int d){data=d;} }

    static Node head = null, tail = null;

    static void insert(int val) {
        Node n = new Node(val);
        if (head == null) { head = tail = n; return; }
        n.prev = tail; tail.next = n; tail = n;
    }

    static void delete(int val) {
        Node cur = head;
        while (cur != null && cur.data != val) cur = cur.next;
        if (cur == null) return;
        if (cur.prev != null) cur.prev.next = cur.next; else head = cur.next;
        if (cur.next != null) cur.next.prev = cur.prev; else tail = cur.prev;
    }

    static void printForward()  { Node c=head; while(c!=null){System.out.print(c.data+" <-> ");c=c.next;} System.out.println("null"); }
    static void printBackward() { Node c=tail; while(c!=null){System.out.print(c.data+" <-> ");c=c.prev;} System.out.println("null"); }

    public static void main(String[] args) {
        insert(10); insert(20); insert(30);
        System.out.print("Forward:  "); printForward();
        delete(20);
        System.out.print("After del 20 (forward): "); printForward();
        System.out.print("Backward: "); printBackward();

import java.util.Scanner;

public class StackArray {
    static int[] stack = new int[100];
    static int top = -1;

    static void push(int val) {
        if (top == stack.length - 1) { System.out.println("Stack Overflow!"); return; }
        stack[++top] = val;
    }

    static int pop() {
        if (top == -1) { System.out.println("Stack Underflow!"); return -1; }
        return stack[top--];
    }

    static int peek() { return top == -1 ? -1 : stack[top]; }
    static boolean isEmpty() { return top == -1; }

    public static void main(String[] args) {
        push(10); push(20); push(30);
        System.out.println("Top (peek) = " + peek());
        System.out.println("Popped: " + pop());
        System.out.println("Popped: " + pop());
        System.out.println("Top after pops = " + peek());
    }
}`},

public class QueueArray {
    static int[] queue = new int[100];
    static int front = 0, rear = -1, size = 0;

    static void enqueue(int val) {
        if (size == queue.length) { System.out.println("Queue Full!"); return; }
        rear = (rear + 1) % queue.length;
        queue[rear] = val;
        size++;
    }

    static int dequeue() {
        if (size == 0) { System.out.println("Queue Empty!"); return -1; }
        int val = queue[front];
        front = (front + 1) % queue.length;
        size--;
        return val;
    }

    public static void main(String[] args) {
        enqueue(10); enqueue(20); enqueue(30);
        System.out.println("Dequeued: " + dequeue()); // 10
        System.out.println("Dequeued: " + dequeue()); // 20
        enqueue(40);
        System.out.println("Dequeued: " + dequeue()); // 30
    }
}`},

import java.util.Scanner;
import java.util.Stack;

public class BalancedParentheses {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter expression: ");
        String expr = sc.nextLine();

        Stack<Character> stack = new Stack<>();
        boolean balanced = true;

        for (char c : expr.toCharArray()) {
            if (c == '(' || c == '{' || c == '[') {
                stack.push(c);
            } else if (c == ')' || c == '}' || c == ']') {
                if (stack.isEmpty()) { balanced = false; break; }
                char top = stack.pop();
                if ((c==')' && top!='(') || (c=='}' && top!='{') || (c==']' && top!='['))
                    { balanced = false; break; }
            }
        }

        if (!stack.isEmpty()) balanced = false;
        System.out.println(balanced ? "Balanced!" : "NOT Balanced.");
        sc.close();
    }
}`},

import java.util.Scanner;

public class ToggleKthBit {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter number: ");
        int n = sc.nextInt();
        System.out.print("Enter bit position k (0-indexed): ");
        int k = sc.nextInt();

        // XOR with (1 << k) flips the k-th bit
        int toggled = n ^ (1 << k);

import java.util.Scanner;

public class CountSetBits {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        System.out.print("Enter a number: ");
        int n = sc.nextInt();

        int count = 0;
        int tmp = n;
        // Brian Kernighan's trick: n & (n-1) clears the lowest set bit
        while (tmp != 0) { tmp = tmp & (tmp - 1); count++; }

        System.out.println("Binary: " + Integer.toBinaryString(n));
        System.out.println("Number of set bits: " + count);

        sc.close();
    }
}`},

function highlightCode(code) {
  const keywords = ['public','private','protected','class','static','void','int','long','double','float','char','boolean','String','return','if','else','while','for','do','switch','case','break','new','import','null','true','false','final'];
  let html = code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // comments
  html = html.replace(/(\/\/[^\n]*)/g,'<span class="cm">$1</span>');
  // strings
  html = html.replace(/"([^"\\]|\\.)*"/g, s => `<span class="st">${s}</span>`);
  // numbers
  html = html.replace(/\b(\d+\.?\d*)\b/g,'<span class="nb">$1</span>');
  // keywords
  keywords.forEach(kw => {
    html = html.replace(new RegExp(`\\b${kw}\\b`, 'g'), `<span class="kw">${kw}</span>`);
  });
  return html;
}
